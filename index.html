<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manu Polo | Sales Operations Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 20px 40px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .layout {
      display: flex;
      gap: 20px;
      padding: 20px 40px;
      align-items: flex-start;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 30%;
      min-width: 250px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.85;
    }

    .left-panel h3 {
      margin-top: 0;
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* CENTER VIDEO */
    .video-box {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: black;
      flex: 1;
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: cover;
    }

    /* RIGHT/MENU BELOW ON MOBILE */
    .right-panel {
      width: 25%;
      min-width: 200px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: left;
    }

    .menu button:hover {
      border-color: white;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .left-panel, .right-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  MANU POLO — SALES OPERATIONS PORTFOLIO
</header>

<div class="layout">

  <!-- LEFT PANEL (DESCRIPTION) -->
  <div class="left-panel" id="info">
    <h3>Use Case</h3>
    Click a project to explore a Salesforce Sales Operations process.
  </div>

  <!-- CENTER VIDEO -->
  <div class="video-box" id="videoBox">
    <img src="https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif" />
  </div>

  <!-- RIGHT MENU -->
  <div class="right-panel">
    <div class="menu">

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Opportunity Sales Process Enforcement',
        'Designed a structured Opportunity lifecycle aligned with sales methodology. Each stage requires mandatory fields such as qualification data, business needs, and decision criteria. Validation rules prevent progression until data completeness is achieved.'
      )">
        Opportunity Process
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Lead Routing Automation',
        'Automated lead assignment using Salesforce Flow based on territory, industry, and workload balancing.'
      )">
        Lead Routing
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Dashboard Security Model',
        'Implemented role-based dashboard visibility to ensure data segmentation by region and hierarchy.'
      )">
        Dashboards
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'CRM Data Quality Framework',
        'Introduced validation rules and required fields strategy to improve CRM data accuracy and reporting reliability.'
      )">
        Data Quality
      </button>

    </div>
  </div>

</div>

<script>
function changeCase(videoId, title, description) {

  // Replace GIF with video
  const box = document.getElementById("videoBox");

  box.innerHTML =
    '<iframe src="https://www.youtube.com/embed/' +
    videoId +
    '?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';

  // Update LEFT panel description
  document.getElementById("info").innerHTML = `
    <h3>${title}</h3>
    <p>${description}</p>
  `;
}
</script>

</body>
</html>
