<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manu Polo | Sales Operations Portfolio</title>

  <!-- Clean modern font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #111111;
      --border: #1f1f1f;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.65);
      --faint: rgba(255,255,255,0.4);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 24px 40px;
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--faint);
      border-bottom: 1px solid var(--border);
    }

    .layout {
      display: flex;
      gap: 28px;
      padding: 28px 40px;
      align-items: flex-start;
    }

    /* LEFT PANEL */
    .left-panel {
      width: 30%;
      min-width: 260px;
      padding-right: 10px;
    }

    .left-panel h3 {
      margin: 0 0 12px 0;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--faint);
    }

    .left-panel p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0;
    }

    /* CENTER VIDEO (UNCHANGED SIZE LOGIC) */
    .video-box {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: black;
      flex: 1;

      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: cover;
    }

    /* RIGHT PANEL */
    .right-panel {
      width: 24%;
      min-width: 220px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu button {
      background: linear-gradient(180deg, #121212, #0e0e0e);
      border: 1px solid var(--border);
      color: var(--muted);

      padding: 12px 14px;
      cursor: pointer;

      font-size: 12px;
      letter-spacing: 1.2px;
      text-align: left;

      transition: all 0.2s ease;
    }

    .menu button:hover {
      border-color: rgba(255,255,255,0.35);
      color: var(--text);
      transform: translateY(-1px);
    }

    .menu button:active {
      transform: translateY(0px);
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .left-panel, .right-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<header>
  MANU POLO — SALES OPERATIONS PORTFOLIO
</header>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="left-panel" id="info">
    <h3>Use Case</h3>
    <p>
      Click a project to explore a Salesforce Sales Operations process.
    </p>
  </div>

  <!-- CENTER VIDEO (UNCHANGED SIZE) -->
  <div class="video-box" id="videoBox">
    <img src="https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif" />
  </div>

  <!-- RIGHT MENU -->
  <div class="right-panel">
    <div class="menu">

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Opportunity Sales Process Enforcement',
        'Structured Opportunity lifecycle aligned with sales methodology. Each stage requires mandatory fields (qualification, business needs, decision criteria). Validation rules prevent progression without data completeness.'
      )">
        Opportunity Process
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Lead Routing Automation',
        'Automated lead assignment using Salesforce Flow based on territory, industry, and workload balancing.'
      )">
        Lead Routing
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'Dashboard Security Model',
        'Role-based dashboard visibility ensuring segmentation across regions and reporting structures.'
      )">
        Dashboards
      </button>

      <button onclick="changeCase(
        'dQw4w9WgXcQ',
        'CRM Data Quality Framework',
        'Validation rules and required field strategy improving CRM accuracy and forecasting reliability.'
      )">
        Data Quality
      </button>

    </div>
  </div>

</div>

<script>
function changeCase(videoId, title, description) {

  const box = document.getElementById("videoBox");

  box.innerHTML =
    '<iframe src="https://www.youtube.com/embed/' +
    videoId +
    '?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';

  document.getElementById("info").innerHTML = `
    <h3>${title}</h3>
    <p>${description}</p>
  `;
}
</script>

</body>
</html>
