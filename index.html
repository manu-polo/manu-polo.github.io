<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manu Polo | Sales Operations Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 20px 40px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .video-box {
      width: 80%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: black;
      margin-top: 20px;
    }

    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: cover;
    }

    .menu {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .menu button:hover {
      border-color: white;
    }

    .info {
      max-width: 900px;
      margin-top: 30px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.85;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  MANU POLO — SALES OPERATIONS PORTFOLIO
</header>

<div class="container">

  <!-- INITIAL STATE: SALESFORCE GIF -->
  <div class="video-box" id="videoBox">
    <img src="https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif" />
  </div>

  <!-- MENU -->
  <div class="menu">

    <button onclick="changeVideo('dQw4w9WgXcQ',
      'Approval Process Automation',
      'Reduced approval time from 2 days to 30 minutes using Salesforce approval workflows.')">
      Approval Process
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ',
      'Lead Routing Flow',
      'Automated lead assignment using Salesforce Flow and territory rules.')">
      Lead Routing
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ',
      'Dashboard Security',
      'Implemented role-based dashboard visibility across regions.')">
      Dashboards
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ',
      'Data Quality Rules',
      'Improved CRM data quality using validation rules and automation.')">
      Data Quality
    </button>

  </div>

  <!-- DESCRIPTION -->
  <div class="info" id="info">
    Click a project above to explore a Sales Operations use case.
  </div>

</div>

<script>
function changeVideo(videoId, title, description) {
  const box = document.getElementById("videoBox");

  box.innerHTML =
    '<iframe src="https://www.youtube.com/embed/' +
    videoId +
    '?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>';

  document.getElementById("info").innerHTML =
    "<strong>" + title + "</strong><br><br>" + description;
}
</script>

</body>
</html>
