<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manu Polo | Sales Operations</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 20px 40px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .video-box {
      width: 80%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      background: black;
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .menu {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu button {
      background: none;
      border: 1px solid #333;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .menu button:hover {
      border-color: white;
    }

    .info {
      max-width: 900px;
      margin-top: 30px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<header>
  MANU POLO — SALES OPERATIONS PORTFOLIO
</header>

<div class="container">

  <div class="video-box">
    <iframe id="video"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen>
    </iframe>
  </div>

  <div class="menu">
    <button onclick="changeVideo('dQw4w9WgXcQ', 'Approval Process Automation', 'Reduced approval time from 2 days to 30 minutes.')">
      Approval Process
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ', 'Lead Routing Flow', 'Automated lead assignment using Salesforce Flow.')">
      Lead Routing
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ', 'Dashboard Security', 'Implemented role-based dashboard visibility.')">
      Dashboards
    </button>

    <button onclick="changeVideo('dQw4w9WgXcQ', 'Data Quality Rules', 'Improved CRM data accuracy with validation rules.')">
      Data Quality
    </button>
  </div>

  <div class="info" id="info">
    Click a project above to explore a Sales Operations use case.
  </div>

</div>

<script>
function changeVideo(videoId, title, description) {
  document.getElementById("video").src =
    "https://www.youtube.com/embed/" + videoId;

  document.getElementById("info").innerHTML =
    "<strong>" + title + "</strong><br><br>" + description;
}
</script>

</body>
</html>
